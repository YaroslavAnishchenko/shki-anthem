<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гимн ШКИ — Visual Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="background-glow" id="bg-glow"></div>
    
    <canvas id="particles-canvas"></canvas>

    <div class="container">
        <header class="header">
            <h1 class="glitch">Гимн ШКИ</h1>
            <p class="subtitle">Официальный саундтрек нашей семьи</p>
        </header>

        <main>
            <section class="player-card">
                <canvas id="visualizer"></canvas>

                <div class="cover-art" id="cover">
                    <div class="center-hole"></div>
                </div>
                
                <audio id="audio" src="anthem.mp3" crossorigin="anonymous"></audio>
                
                <div class="controls">
                    <button id="share-btn" class="control-btn secondary-btn"><i class="fas fa-share-alt"></i></button>
                    <button id="play-btn" class="control-btn"><i class="fas fa-play"></i></button>
                    <button id="lyrics-btn" class="control-btn secondary-btn"><i class="fas fa-align-center"></i></button>
                </div>
                
                <div class="progress-area">
                    <span id="current-time">0:00</span>
                    <div class="progress-bar" id="progress-container">
                        <div class="progress" id="progress"></div>
                    </div>
                    <span id="duration">0:00</span>
                </div>
            </section>

            <section class="karaoke-section hidden" id="karaoke-section">
                <div class="lyrics-container" id="lyrics-container">
                    </div>
            </section>
        </main>
    </div>

    <div id="qr-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-qr" class="close">&times;</span>
            <h2>Слушаем вместе!</h2>
            <p>Отсканируй, чтобы открыть гимн на своем телефоне</p>
            <div id="qrcode"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
